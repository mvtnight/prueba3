name: CI/CD Pipeline - DevOps 100%

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Análisis de Código y Seguridad (IE5/IE6)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Necesario para SonarCloud

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Escaneo de SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Este token ya viene por defecto en GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-ec2:
    name: Despliegue en AWS EC2 (IE2)
    runs-on: ubuntu-latest
    needs: build-and-test # ESTO ES VITAL: Solo se despliega si SonarCloud pasa las pruebas (IE6)
    if: github.ref == 'refs/heads/main' # Solo despliega si es la rama main
    steps:
      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Instalamos docker y git si no están (útil para la primera vez)
            sudo yum update -y
            sudo yum install docker git -y || sudo apt update && sudo apt install docker.io git -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            
            # Clonamos o actualizamos el repositorio
            if [ ! -d "mi-proyecto-devops" ]; then
              git clone https://github.com/${{ github.repository }}.git mi-proyecto-devops
            fi
            cd mi-proyecto-devops
            git pull origin main
            
            # Levantamos el microservicio con logs hacia CloudWatch
            sudo /usr/local/bin/docker-compose down
            sudo /usr/local/bin/docker-compose up -d --build